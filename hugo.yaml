                    slogan: The 1st workshop on EXplainable artificial intelligence for Trustworthy and Resilient Aerial NETworks
                    location: Avignon, France
                    description: |
                        #### Topics
                        Uncrewed Aerial Vehicles (UAVs) are fundamental to next-generation 6G architectures and the deployment of 3D Space-Air-Ground Integrated Networks (SAGINs). UAVs, along with High-Altitude Platforms (HAPs) and satellites, must maintain seamless connectivity in highly dynamic environments subject to signal clutter, adverse meteorology, and adversarial threats. Ensuring the safety, operational efficiency, and trustworthiness of these aerial nodes is a primary bottleneck in SAGIN deployment.
                        While Artificial Intelligence (AI) provides the necessary optimization capabilities for 6G ecosystems, the inherent opacity of conventional Machine Learning (ML) and Deep Learning (DL) models severely limits their adoption in safety-critical aviation and networking tasks. Explainable AI (XAI) is required to resolve this deficit, as it introduces transparency, interpretability, and verifiable reasoning into network orchestration and UAV control. By leveraging XAI, aerial networks can dynamically process geospatial and meteorological data to optimize trajectories and maintain resilient connectivity, while providing human operators with interpretable/auditable decision-making processes. 
                        This workshop targets the intersection of XAI, 6G architectures, and SAGINs with special interest in UAV-centric applications. We solicit original research addressing the following domains: 
                        - XAI architectures for transparent UAV decision-making and navigation. 
                        - Quantitative metrics for evaluating trustworthiness and interpretability in AI-empowered SAGINs. 
                        - Explainability-driven semantic compression and semantic communications for efficient UAV-enabled 6G networks. 
                        - Ethical, legal, and regulatory compliance of AI-driven autonomous aerial operations. 
                        - Detection, tracking, and neutralization of malicious UAVs via interpretable AI. 
                        - XAI protocols for secure and trustworthy UAV communications. 
                        - Maintaining UAV trustworthiness and operational continuity in zero-trust network environments. 
                        - Interoperability protocols for UAVs within heterogeneous 6G networks. 
                        - Energy-efficient XAI routing and resource allocation for 3D SAGIN infrastructure. 
                        - AI-powered traffic management and airspace deconfliction. 
                        - Real-world implementations demonstrating the integration of XAI into 6G networks. 
                        #### Important Dates
                        - Paper submission deadline: **July 15, 2026**
                        - Paper acceptance notification: **August 15, 2026**
                        - Camera ready & author registration: **September 1, 2026**
                        #### Submission process
                        Paper revision and presentation is managed through the
                        EDAS system.
                        #### Registration
                        Workshop registration is automatically granted for people
                        that register to IEEE WiMob conference.
                        [Click here](http://www.wimob.org/) for more details.
                        #### Contact us
                        For any inquiry, please contact us at **<pre>extranet-workshop</pre>** <pre>@</pre> **<pre>poliba.it</pre>**
                    directions: |
                       IEEE EXTRANET Workshop takes place in conjunction with IEEE WiMob 2026. For more information on the venue, registration, and how to reach it, please visit the [conference related page](http://www.wimob.org/wimob2026/venue.php).
                    aboutUs:
                        For any inquiry, please contact us at **<pre>extranet-workshop</pre>** <pre>@</pre> **<pre>poliba.it</pre>**

